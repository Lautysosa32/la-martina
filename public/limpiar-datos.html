<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Limpiando datos...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: white; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 400px; }
    h2 { margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    .ok { color: #16a34a; font-weight: bold; }
    .key { font-family: monospace; font-size: 12px; color: #555; margin: 4px 0; }
  </style>
</head>
<body>
<div class="box">
  <h2>🧹 Limpiando datos de prueba...</h2>
  <p>Conservando inventario, clientes y empleados.</p>
  <div id="log"></div>
  <p id="status"></p>
</div>
<script>
  const keys = [
    'la-martina-admin-orders',
    'la-martina-admin-cash-closes',
    'la-martina-admin-cashmovements',
    'la-martina-admin-last-pos-close',
    'la-martina-cash-register',
    'la-martina-invoices',
    'la-martina-admin-offers',
    'la-martina-offer-redemptions',
  ];

  const log = document.getElementById('log');
  keys.forEach(k => {
    localStorage.removeItem(k);
    const el = document.createElement('div');
    el.className = 'key';
    el.textContent = '✓ ' + k;
    log.appendChild(el);
  });

  document.getElementById('status').innerHTML = '<span class="ok">¡Listo! Redirigiendo...</span>';

  setTimeout(() => {
    window.location.href = '/';
  }, 2000);
</script>
</body>
</html>
